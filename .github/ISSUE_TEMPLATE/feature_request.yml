name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: capability
    attributes:
      label: Related capability
      description: Which of ClawMaster's six capabilities does this relate to?
      options:
        - "能接管 (Setup & Onboarding)"
        - "能观测 (Observability)"
        - "能省钱 (Cost Reduction)"
        - "能应用 (Applications)"
        - "能构建 (Agent Builder)"
        - "能守护 (Security & Governance)"
        - "Other / Infrastructure"
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What is the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? A mockup description or flow is more useful than a screenshot.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
