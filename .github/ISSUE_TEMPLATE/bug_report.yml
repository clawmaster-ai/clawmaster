name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows x64
        - Linux x64
        - Web (browser)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ClawMaster version
      placeholder: "e.g. 0.3.0 — find it in Settings or run: clawmaster --version"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0 — run: node --version"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Paste relevant error messages, config excerpts, or log lines.
        Do not attach screenshots — describe what you see in text.
    validations:
      required: false
