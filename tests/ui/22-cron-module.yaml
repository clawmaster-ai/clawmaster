suite: cron-module
name: Cron 模块
description: |
  验证 Cron 模块当前版本的关键管理与跨模块流程：
  1. 页面与任务列表基础渲染
  2. 调度助手预览与常用预设
  3. 从 Observe 载入成本摘要模板
  4. 创建、手动执行、查看运行记录

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 已进入主界面
  - 本地环境已安装 OpenClaw
  - 网关已启动

viewport: { width: 1440, height: 900 }

cases:
  - id: cron-01
    name: 页面基础渲染
    steps:
      - action: navigate
        url: "{BASE_URL}/cron"
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: cron-page
    assertions:
      - 页面标题为"Cron Jobs"或"定时任务"
      - 显示顶部操作按钮"Refresh"与"Create Job"
      - 显示统计卡片：总任务数、调度器、网关
      - 显示筛选器与任务列表或空状态

  - id: cron-02
    name: 网关未就绪时的保护提示
    preconditions:
      - 网关未启动或 cron 接口不可用
    steps:
      - action: navigate
        url: "{BASE_URL}/cron"
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: cron-gateway-warning
    assertions:
      - 页面仍可渲染
      - 显示 gateway 相关警告
      - "Create Job" 按钮处于禁用状态
      - 提供跳转到 Gateway 页面入口

  - id: cron-03
    name: 新建任务对话框与调度助手
    steps:
      - action: navigate
        url: "{BASE_URL}/cron"
      - action: wait
        duration: 2000ms
      - action: click
        target: text("Create Job")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: cron-create-dialog
      - action: click
        target: text("Weekdays 08:00")
      - action: wait
        duration: 300ms
      - action: screenshot
        name: cron-schedule-helper
    assertions:
      - 弹出对话框标题为"Create Cron Job"
      - 显示名称、说明、调度类型、消息、session、model、agent 等输入项
      - 显示"Schedule helper"与"Presets"
      - 点击预设后会填充 cron expression
      - 预览区显示可读说明与时区提示

  - id: cron-04
    name: 从 Observe 模板创建成本摘要任务
    preconditions:
      - 已安装 bundled clawprobe-cost-digest 技能
      - 至少有一个可用文本模型
    steps:
      - action: navigate
        url: "{BASE_URL}/cron?template=cost-digest&period=week"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: cron-template-dialog
    assertions:
      - 自动打开新建任务对话框
      - 周报摘要模板已预填名称、说明、cron 表达式与 prompt
      - 默认 session 为 isolated，agent 为 main
      - Announce 默认关闭，可按需填写 model/channel/to

  - id: cron-05
    name: 创建并手动执行成本摘要任务
    preconditions:
      - bundled clawprobe-cost-digest 技能已安装
      - 存在可稳定执行工具流的文本模型
    steps:
      - action: navigate
        url: "{BASE_URL}/cron?template=cost-digest&period=week"
      - action: wait
        duration: 1500ms
      - action: fill
        target: label("名称")
        value: "周报摘要 E2E"
      - action: fill
        target: label("Model")
        value: "填写一个当前环境可用的文本模型 ID"
      - action: click
        target: text("Create Job")
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: cron-created-job
      - action: click
        target: text("Run Now")
      - action: wait
        duration: 5000ms
    assertions:
      - 创建成功后列表中出现新任务
      - 任务卡片显示成本摘要名称、schedule、session 与 prompt 摘要
      - 手动执行后页面反馈已入队或执行成功

  - id: cron-06
    name: 查看运行记录与摘要输出
    preconditions:
      - 至少有一个已执行完成的 cron 任务
    steps:
      - action: navigate
        url: "{BASE_URL}/cron"
      - action: wait
        duration: 3000ms
      - action: click
        target: text("Run History")
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: cron-run-history
    assertions:
      - 显示运行记录标题
      - 记录卡片包含状态、开始时间、结束时间、耗时
      - 成功记录显示 ok / success 类状态
      - 输出区域使用预格式文本展示最终摘要或错误详情
