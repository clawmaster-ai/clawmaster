suite: observe-module
name: 可观测模块
description: |
  验证可观测模块当前版本的核心用户流：
  1. 运行态与成本概览可正常渲染
  2. 定时成本摘要卡片可从 Observe 跳转到 Cron 模板
  3. 页面在未安装或未启动 ClawProbe 时仍提供恢复入口

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 已进入主界面

viewport: { width: 1440, height: 900 }

cases:
  - id: obs-01
    name: 页面基础渲染
    steps:
      - action: navigate
        url: "{BASE_URL}/observe"
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: observe-overview
    assertions:
      - 页面标题为"可观测"或"Observe"
      - 显示运行态区域（daemon / 今日成本 / 上下文占用）
      - 显示成本趋势区域
      - 显示"定时成本摘要"区域
      - 如存在建议，建议卡片按严重度着色

  - id: obs-02
    name: ClawProbe 未就绪时提供恢复入口
    preconditions:
      - ClawProbe 未安装，或 daemon 未启动
    steps:
      - action: navigate
        url: "{BASE_URL}/observe"
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: observe-recovery
    assertions:
      - 页面不会白屏
      - 若未安装：显示安装引导、安装按钮与重试入口
      - 若未运行：显示启动/自举按钮与错误说明
      - 错误态下仍可刷新页面

  - id: obs-03
    name: 定时成本摘要卡片
    preconditions:
      - ClawProbe 已安装并可返回成本数据
    steps:
      - action: navigate
        url: "{BASE_URL}/observe"
      - action: wait
        duration: 3000ms
      - action: screenshot
        name: observe-digests
    assertions:
      - 显示日/周/月三张摘要卡片
      - 每张卡片显示摘要名称、计划时间与描述
      - 侧栏说明摘要包含总成本、明细、Top 模型与趋势
      - 显示进入 Cron 的入口

  - id: obs-04
    name: 从 Observe 跳转到 Cron 成本摘要模板
    preconditions:
      - 网关可用
    steps:
      - action: navigate
        url: "{BASE_URL}/observe"
      - action: wait
        duration: 3000ms
      - action: click
        target: text("周报摘要")
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: observe-to-cron-template
    assertions:
      - 成功跳转到 /cron?template=cost-digest&period=week
      - 自动弹出 Cron 新建对话框
      - 名称、cron 表达式、agent、prompt 已预填
      - 页面提示模板已载入，要求用户检查 prompt 和投递方式
