suite: gateway-module
name: 网关管理功能
description: |
  验证网关管理页面的完整功能：
  状态显示、启动/停止/重启、配置概览、Token 复制、带鉴权的 WebUI 链接、日志与诊断入口

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 已进入主界面

viewport: { width: 1280, height: 800 }

cases:
  - id: gw-01
    name: 状态指示器渲染
    steps:
      - action: navigate
        url: "{BASE_URL}/gateway"
      - action: wait
        duration: 2000ms
      - action: screenshot
        name: gateway-status
    assertions:
      - 页面标题显示"网关管理"或"Gateway Management"
      - 状态卡片显示"运行中"或"已停止"
      - 页面显示由 buildGatewayUrl 生成的 "ws://"
      - 操作区域存在"启动"或"Start"，或存在"停止"与"重启"

  - id: gw-02
    name: 网关启动操作
    preconditions:
      - 网关当前处于停止状态
    steps:
      - action: click
        target: text("启动")
      - action: observe
        duration: 3000ms
    assertions:
      - 启动中时按钮区域显示"启动中..."或"Starting..."
      - 操作完成后状态变为"运行中"或"Running"
      - 启动完成后显示"停止"和"重启"，或"Stop"和"Restart"

  - id: gw-03
    name: 配置概览卡片
    steps:
      - action: scroll_to
        target: 配置概览区域
      - action: screenshot
        name: gateway-config
    assertions:
      - 显示"配置"或"Config"标题
      - 配置区显示"端口"或"Port"
      - 配置区显示"绑定"或"Bind"
      - 配置区显示"认证"或"Auth"
      - Token 区域显示"复制 Token"、"Click to copy"或等价入口

  - id: gw-04
    name: 复制 Token 按钮
    preconditions:
      - 配置中存在 gateway.auth.token
    steps:
      - action: click
        target: text("复制 Token")
      - action: wait
        duration: 500ms
    assertions:
      - 页面出现"Token 已复制"或"Token copied"提示

  - id: gw-05
    name: 在浏览器中打开链接
    steps:
      - action: observe
        target: text("在浏览器中打开")
    assertions:
      - '"在浏览器中打开"或"Open OpenClaw WebUI"按钮可见'
      - 按钮 href 由 gateway 配置生成，而不是硬编码 localhost
      - 按钮带有 token 参数（若 auth.mode=token）
      - 按钮有 target="_blank" 属性

  - id: gw-06
    name: 网关重启操作
    preconditions:
      - 网关当前处于运行状态
    steps:
      - action: click
        target: text("重启")
      - action: observe
        duration: 5000ms
    assertions:
      - 按钮区域显示"重启中..."或"Restarting..."
      - 操作完成后状态恢复为"运行中"或"Running"
      - '"停止"和"重启"或"Stop"和"Restart"按钮恢复可用'

  - id: gw-07
    name: 最近日志与诊断入口
    steps:
      - action: click
        target: text("View Recent Logs")
      - action: wait
        duration: 800ms
      - action: screenshot
        name: gateway-recent-logs
    assertions:
      - 打开标题为"Recent Gateway Logs"或"最近网关日志"的面板
      - 面板只显示 gateway 相关日志，而不是无过滤的全量日志
      - 页面保留"More Diagnostics"或"更多诊断"入口
