suite: mcp-servers
name: MCP 服务工作流
description: |
  验证 MCP 页面新的主流程：
  已接入服务总览、推荐服务选择、导入现有配置、手动添加服务。

preconditions:
  - dev server 已启动（{BASE_URL} 可访问）
  - 已进入主界面

viewport: { width: 1440, height: 960 }

cases:
  - id: mcp-01
    name: 页面首屏结构
    steps:
      - action: navigate
        url: "{BASE_URL}/mcp"
      - action: wait
        duration: 1500ms
      - action: screenshot
        name: mcp-overview
    assertions:
      - 页面标题为“MCP 服务 / MCP Servers”
      - 页首展示三个信息标签：传输方式、导入来源、OpenClaw 提示
      - 显示四个指标卡：已接入、已启用、远程端点、检测到的导入源
      - 主内容为左右两列：左侧服务浏览，右侧操作面板
      - 不使用分隔 hr 线切断卡片内容，间距清晰

  - id: mcp-02
    name: 已接入服务区
    steps:
      - action: navigate
        url: "{BASE_URL}/mcp"
      - action: wait
        duration: 1000ms
      - action: screenshot
        name: mcp-installed
    assertions:
      - 顶部先展示“已接入服务”
      - 每个服务卡片显示：名称、启用状态、传输方式、命令或 URL
      - 已从文件导入的服务可看到来源路径
      - 已知目录服务可直接点击“打开配置”
      - 所有操作按钮使用图标 + 文案，无 emoji

  - id: mcp-03
    name: 推荐服务切换到配置面板
    steps:
      - action: click
        target: text("GitHub")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: mcp-setup-github
    assertions:
      - 右侧配置面板标题切换为“GitHub”
      - 显示传输方式与包名/端点信息
      - 显示必填令牌输入框
      - 若服务未安装，主按钮为“安装并启用 / Connect and enable”类型动作
      - 面板底部无多余分隔线，依赖留白分组

  - id: mcp-04
    name: 浏览更多服务与分类过滤
    steps:
      - action: click
        target: text("效率工具")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: mcp-filter-productivity
    assertions:
      - “更多服务”区域支持分类 pill 切换
      - 当前分类按钮高亮
      - 列表只保留对应分类服务
      - 点击卡片后右侧配置面板随之更新

  - id: mcp-05
    name: 导入现有 MCP 配置
    steps:
      - action: scroll_to
        target: text("导入现有配置")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: mcp-import-panel
    assertions:
      - 导入面板列出常见来源：.mcp.json、Cursor、VS Code、Claude、Codex、Copilot
      - 已存在路径显示可导入按钮，不存在显示“未发现 / Not found”
      - 支持输入自定义路径导入
      - 导入完成后展示导入结果摘要和服务 ID 标签

  - id: mcp-06
    name: 手动添加服务
    steps:
      - action: scroll_to
        target: text("手动添加服务")
      - action: wait
        duration: 500ms
      - action: screenshot
        name: mcp-manual-panel
    assertions:
      - 手动面板支持 stdio、HTTP、SSE 三种传输方式
      - stdio 模式显示包名、命令、参数、环境变量
      - HTTP/SSE 模式显示 URL、请求头、环境变量
      - 表单布局使用 grid/flex，移动端会自然堆叠
      - 主按钮文案明确为“添加服务 / Add server”
